name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sign commit
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          COMMIT_SHA="${{ github.sha }}"
          printf '%s' "$COMMIT_SHA" > commit.hash

          # Decode base64-encoded key to temp file, sign, then shred
          KEYFILE=$(mktemp)
          printf '%s' "$SIGNING_KEY" | base64 -d > "$KEYFILE"
          openssl pkeyutl -sign -inkey "$KEYFILE" -rawin -in commit.hash -out commit.sig
          shred -u "$KEYFILE"

          echo "Signed commit: $COMMIT_SHA"

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          SSH_KEY: ${{ secrets.VPS_DEPLOY_KEY }}
          VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          # Set up SSH with strict host key verification
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$VPS_HOST_KEY" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          SSH_OPTS="-o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts -i ~/.ssh/deploy_key"

          # Copy commit hash and signature to VPS
          scp $SSH_OPTS commit.hash commit.sig deploy@"$VPS_HOST":~/

          # Verify signature and deploy
          ssh $SSH_OPTS deploy@"$VPS_HOST" "sudo /usr/local/bin/ppvda-deploy $COMMIT_SHA"

          # Health check
          sleep 10
          ssh $SSH_OPTS deploy@"$VPS_HOST" \
            'curl -sf http://localhost:3000/health || echo "WARNING: health check failed"'

          # Clean up
          rm -f ~/.ssh/deploy_key
