services:
  ppvda:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DRK_BINARY_PATH=/usr/local/bin/darkreel-cli
    volumes:
      - ./downloads:/app/downloads
      - ./data:/app/data
      - ./mullvad:/app/mullvad
    # Required for WireGuard tunnel (Mullvad)
    privileged: true
    devices:
      - /dev/net/tun:/dev/net/tun
