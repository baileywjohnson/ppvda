services:
  ppvda:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./downloads:/app/downloads
      - ./data:/app/data
      - ./mullvad:/app/mullvad
    # Required for WireGuard tunnel (Mullvad)
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
