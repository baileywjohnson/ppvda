services:
  ppvda:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PROXY_URL=${PROXY_URL:-}
      - MULLVAD_ACCOUNT=${MULLVAD_ACCOUNT:-}
      - MULLVAD_LOCATION=${MULLVAD_LOCATION:-}
      - LOG_LEVEL=debug
      # Auth (PPVDA_PASSWORD is required)
      - PPVDA_USERNAME=${PPVDA_USERNAME:-admin}
      - PPVDA_PASSWORD=${PPVDA_PASSWORD:?PPVDA_PASSWORD must be set}
      - JWT_SECRET=${JWT_SECRET:-}
      # Darkreel integration (optional)
      - DARKREEL_SERVER=${DARKREEL_SERVER:-}
      - DARKREEL_USER=${DARKREEL_USER:-}
      - DARKREEL_PASS=${DARKREEL_PASS:-}
    volumes:
      - ./downloads:/app/downloads
      - ./mullvad:/app/mullvad
    # Required for WireGuard tunnel (Mullvad)
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
